<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HuellaVet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>

    <!-- ===== LOGIN ===== -->
    <section id="loginSection" class="d-flex align-items-center justify-content-center min-vh-100">
        <div class="card shadow p-4" style="width: 360px;">
            <h4 class="text-center fw-bold mb-0">🐾 HuellaVet</h4>
            <p class="text-center text-muted mb-4">Login</p>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Correo</label>
                    <input type="email" class="form-control" id="email" placeholder="correo@ejemplo.com" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                </div>
                <p id="loginError" class="text-danger small mb-2 d-none">Correo o contraseña incorrectos.</p>
                <button type="submit" class="btn btn-primary w-100">Ingresar</button>
            </form>
        </div>
    </section>

    <!-- ===== DASHBOARD ===== -->
    <section id="dashboard" class="d-none">

        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4">
            <span class="navbar-brand fw-bold">🐾 HuellaVet</span>
            <span class="ms-auto text-white-50 small" id="userLabel"></span>
            <button class="btn btn-outline-light btn-sm ms-3" id="logoutBtn">Cerrar sesión</button>
        </nav>

        <!-- Contenido -->
        <div class="container mt-4">

            <!-- Encabezado -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0 fw-semibold">Mascotas registradas</h5>
                <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#petModal">
                    + Agregar mascota
                </button>
            </div>

            <!-- Tabla -->
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0" id="petTable">
                        <thead class="table-primary">
                            <tr>
                                <th>#</th>
                                <th>Nombre</th>
                                <th>Tutor</th>
                                <th>Evolución médica</th>
                            </tr>
                        </thead>
                        <tbody id="petTableBody">
                            <tr id="emptyRow">
                                <td colspan="7" class="text-center text-muted py-4">
                                    Sin mascotas registradas aún.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <!-- ===== MODAL AGREGAR MASCOTA ===== -->
    <div class="modal fade" id="petModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nueva mascota</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="petForm">
                        
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="petName" placeholder="Ej: Firulais" required>
                        </div>
                        
                        <div class="mb-3 mt-3">
                            <label class="form-label">Tutor</label>
                            <input type="text" class="form-control" id="petOwner" placeholder="Ej: Juan Pérez" required>
                        </div>

                        <div class="mb-3 mt-3">
                            <label for="petEvolucion" class="form-label">Evolución Médica</label>
                            <textarea class="form-control" id="petEvolution" rows="3" placeholder="Ej: Paciente presenta mejoría. Se administró vacuna antirrábica..." required></textarea>
                        </div>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary" id="savePetBtn">Guardar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="src/js/Main.js" type="module"></script>
</body>
</html>
